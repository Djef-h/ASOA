<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOA | Advanced System for Artifact Analysis</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS СТИЛОВЕ */
        :root {
            --bg-deep: #05050a;
            --panel-bg: #0d0d1a;
            --accent: #00f2ff;
            --danger: #ff003c;
            --success: #00ff41;
            --warning: #ffea00;
            --text-dim: #555;
        }

        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            overflow-x: hidden;
            font-size: 13px;
        }

        /* LAYOUT */
        .container { display: grid; grid-template-columns: 300px 1fr 300px; height: 100vh; gap: 1px; background: #111; }
        .side-panel { background: var(--panel-bg); display: flex; flex-direction: column; overflow-y: auto; }
        .main-view { background: var(--bg-deep); display: flex; flex-direction: column; position: relative; }

        /* HEADER */
        header { padding: 15px; border-bottom: 1px solid #1a1a2e; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        #clock { font-family: monospace; color: var(--text-dim); }

        /* TABS & NAVIGATION */
        nav { display: flex; background: #08080f; border-bottom: 1px solid #1a1a2e; }
        .nav-btn { flex: 1; padding: 12px; border: none; background: transparent; color: var(--text-dim); cursor: pointer; font-size: 10px; font-weight: 700; text-transform: uppercase; border-right: 1px solid #1a1a2e; }
        .nav-btn.active { color: var(--accent); background: rgba(0, 242, 255, 0.05); box-shadow: inset 0 -2px 0 var(--accent); }

        /* PANELS */
        .tab-panel { display: none; padding: 20px; flex: 1; overflow-y: auto; }
        .tab-panel.active { display: block; }

        /* CARDS & ELEMENTS */
        .card-dark { background: rgba(255,255,255,0.02); border: 1px solid #1a1a2e; border-radius: 4px; padding: 15px; margin-bottom: 15px; }
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        
        /* TERMINAL */
        #terminal { background: #000; height: 180px; overflow-y: auto; padding: 10px; font-family: 'Courier New', monospace; border-top: 1px solid #1a1a2e; font-size: 11px; }
        .log-line { margin-bottom: 4px; border-left: 2px solid #222; padding-left: 8px; }
        .log-time { color: #444; margin-right: 8px; }
        .log-arrow { color: var(--accent); margin-right: 8px; }

        /* INPUTS */
        input, select, textarea { 
            background: #05050a; border: 1px solid #1a1a2e; color: #fff; padding: 8px; 
            width: 100%; box-sizing: border-box; margin-bottom: 10px; border-radius: 2px;
        }
        button.action-btn { 
            background: var(--accent); color: #000; border: none; padding: 10px; 
            width: 100%; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }

        /* ARCHIVE & LISTS */
        .arc-item { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            border-bottom: 1px solid #111; cursor: pointer; transition: background .2s;
        }
        .arc-item:hover { background: rgba(255,255,255,0.03); }
        .arc-bar { width: 4px; height: 40px; border-radius: 2px; }

        /* MODAL */
        #arc-modal { 
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
        }
        #arc-modal.open { display: flex; }
        .modal-box { background: var(--panel-bg); width: 500px; border: 1px solid #1a1a2e; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* CHARTS */
        .chart-container { height: 250px; position: relative; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="side-panel">
        <header><div class="logo">REGISTRY</div></header>
        <div style="padding: 20px;">
            <div class="card-dark">
                <div style="font-size: 9px; color: var(--text-dim); margin-bottom: 5px;">TOTAL RECORDS</div>
                <div id="artifact-count" style="font-size: 24px; font-weight: 900;">0 RECORDS</div>
            </div>
            
            <div class="card-dark">
                <input type="text" id="art-name" placeholder="Artifact Name...">
                <select id="art-type">
                    <option value="GLASS">GLASS</option>
                    <option value="CERAMIC">CERAMIC</option>
                    <option value="STONE">STONE</option>
                    <option value="METAL">METAL</option>
                </select>
                <textarea id="art-desc" placeholder="Brief description..."></textarea>
                <button class="action-btn" onclick="addArtifact()">Add to Database</button>
            </div>
        </div>
        <div id="art-list" style="flex: 1; overflow-y: auto; border-top: 1px solid #111;"></div>
    </div>

    <div class="main-view">
        <header>
            <div class="logo">ASOA // MONITOR</div>
            <div id="clock">00:00:00</div>
            <button id="lang-toggle" onclick="toggleLanguage()" style="background:transparent; border:1px solid #222; color:#555; padding:2px 8px; cursor:pointer;">EN</button>
        </header>

        <nav>
            <button class="nav-btn active" id="btn-realtime" onclick="showTab('realtime')">Real-time Data</button>
            <button class="nav-btn" id="btn-analysis" onclick="showTab('analysis')">Analysis</button>
            <button class="nav-btn" id="btn-config" onclick="showTab('config')">System Config</button>
        </nav>

        <div id="tab-realtime" class="tab-panel active">
            <div class="stat-grid">
                <div class="card-dark">
                    <div style="color:var(--accent); font-size:10px; font-weight:900;">TDS LEVEL (ppt)</div>
                    <div id="tds-val" style="font-size:42px; font-weight:900;">0.00</div>
                </div>
                <div class="card-dark">
                    <div style="color:var(--warning); font-size:10px; font-weight:900;">TEMPERATURE (°C)</div>
                    <div id="temp-val" style="font-size:42px; font-weight:900;">0.0</div>
                </div>
            </div>
            
            <div class="card-dark">
                <div id="plateau-status" style="font-family:monospace; font-size:11px; color:#888;">Initializing Plateau Engine...</div>
            </div>

            <div class="chart-container">
                <canvas id="mainChart"></canvas>
            </div>
        </div>

        <div id="tab-analysis" class="tab-panel">
            <div id="arc-stats" class="stat-grid"></div>
            <div id="arc-list"></div>
        </div>

        <div id="tab-config" class="tab-panel">
            <div id="sysinfo-grid" class="stat-grid"></div>
            <div class="card-dark">
                <button class="action-btn" onclick="toggleNodeForm()">+ Add Network Node</button>
                <div id="node-form" style="display:none; margin-top:15px;">
                    <input type="text" id="node-id" placeholder="Node ID (e.g. ESP-04)">
                    <input type="text" id="node-ip" placeholder="IP Address">
                    <button class="action-btn" style="background:#222; color:#fff;" onclick="addNode()">Register</button>
                </div>
            </div>
            <div id="node-list"></div>
        </div>

        <div id="terminal"></div>
    </div>

    <div class="side-panel">
        <header><div class="logo">MATRIX</div></header>
        <div style="padding:15px;">
            <table style="width:100%; font-size:10px; border-collapse: collapse;">
                <thead>
                    <tr style="text-align:left; color:#444;">
                        <th>MODE</th>
                        <th class="r">TARGET</th>
                        <th class="r">STATUS</th>
                    </tr>
                </thead>
                <tbody id="matrix-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<div id="arc-modal">
    <div class="modal-box" id="arc-modal-content"></div>
</div>

<script>
// ══════════════════════════════════════════════════
// DATA & STATE
// ══════════════════════════════════════════════════
let currentLang = 'BG';
let artifactCount = 0;
let currentMode = 'GLASS';
let mainChart;

const MSG = {
    BG: { init: "Системата е инициализирана", added: "Добавен артефакт", records: "записа", record: "запис", plateau: "ПЛАТО ДОСТИГНАТО", active: "АКТИВЕН ПРОЦЕС", online: "ОНЛАЙН", offline: "ОФЛАЙН" },
    EN: { init: "System Initialized", added: "Artifact Added", records: "records", record: "record", plateau: "PLATEAU REACHED", active: "ACTIVE PROCESS", online: "ONLINE", offline: "OFFLINE" }
};

const MATERIAL_MODES = {
    GLASS:   { name: "Стъкло", nameEn: "Glass", color: "#00f2ff", icon: "💎", target: 15.2, mix: "80/20", cycle: 14 },
    CERAMIC: { name: "Керамика", nameEn: "Ceramic", color: "#ffea00", icon: "🏺", target: 12.5, mix: "60/40", cycle: 21 },
    STONE:   { name: "Камък", nameEn: "Stone", color: "#00ff41", icon: "🗿", target: 8.0, mix: "50/50", cycle: 30 },
    METAL:   { name: "Метал", nameEn: "Metal", color: "#ff003c", icon: "⚔️", target: 4.5, mix: "90/10", cycle: 45 }
};

// ══════════════════════════════════════════════════
// FUNCTIONS
// ══════════════════════════════════════════════════

function logToTerminal(message, type = 'info') {
    const term = document.getElementById('terminal');
    if (!term) return;
    const time = new Date().toLocaleTimeString('bg-BG', {hour12:false});
    const color = type === 'error' ? '#ff003c' : '#00f2ff';
    const div = document.createElement('div');
    div.className = 'log-line';
    div.innerHTML = `<span class="log-time">[${time}]</span><span class="log-arrow" style="color:${color}">>></span>${message}`;
    term.prepend(div);
    while (term.childElementCount > 50) term.removeChild(term.lastChild);
}

function updateArtifactCount() {
    const m = MSG[currentLang];
    document.getElementById('artifact-count').textContent = `${artifactCount} ${artifactCount === 1 ? m.record : m.records}`;
}

function addArtifact() {
    const n = document.getElementById('art-name');
    if (!n.value.trim()) { n.focus(); return; }
    artifactCount++;
    const id = String(artifactCount).padStart(3,'0');
    const type = document.getElementById('art-type').value;
    const desc = document.getElementById('art-desc').value.trim() || '—';
    
    const item = document.createElement('div');
    item.className = 'arc-item';
    item.innerHTML = `
        <div class="arc-bar" style="background:${MATERIAL_MODES[type].color}"></div>
        <div style="flex:1">
            <div style="font-size:11px; font-weight:700;">#${id} — ${n.value.trim()}</div>
            <div style="font-size:9px; color:#444;">${type} | ${desc}</div>
        </div>`;
    document.getElementById('art-list').prepend(item);
    updateArtifactCount();
    logToTerminal(`${MSG[currentLang].added}: ${n.value.trim()}`);
    n.value = ''; document.getElementById('art-desc').value = '';
}

function showTab(tabId) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(`tab-${tabId}`).classList.add('active');
    document.getElementById(`btn-${tabId}`).classList.add('active');
    logToTerminal(`SWITCH_TAB: ${tabId.toUpperCase()}`);
}

async function syncWithESP() {
    try {
        // Замени с твоя истински URL
        const response = await fetch('https://asoa.vercel.app/api/data'); 
        const data = await response.json();

        if (data && data.temp !== undefined) {
            document.getElementById('tds-val').innerText = data.tds.toFixed(2);
            document.getElementById('temp-val').innerText = data.temp.toFixed(1);
            
            const plateau = document.getElementById('plateau-status');
            plateau.innerHTML = `LIDAR: ${data.dist}mm | EC: ${data.ec.toFixed(2)} mS/cm | STATUS: ACTIVE`;

            if (mainChart) {
                mainChart.data.datasets[0].data.push(data.tds);
                mainChart.data.datasets[0].data.shift();
                mainChart.update('none');
            }
        }
    } catch (err) {
        // Симулация за демонстрация, ако няма връзка
        let last = parseFloat(document.getElementById('tds-val').innerText) || 15.0;
        let fakeData = last + (Math.random() * 0.2 - 0.1);
        document.getElementById('tds-val').innerText = fakeData.toFixed(2);
    }
}

function initChart() {
    const ctx = document.getElementById('mainChart').getContext('2d');
    mainChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array(30).fill(''),
            datasets: [{
                data: Array(30).fill(15),
                borderColor: '#00f2ff',
                backgroundColor: 'rgba(0, 242, 255, 0.05)',
                fill: true,
                tension: 0.4,
                borderWidth: 2,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            scales: {
                y: { grid: { color: '#111' }, ticks: { color: '#444' } },
                x: { display: false }
            },
            plugins: { legend: { display: false } }
        }
    });
}

function renderMatrix() {
    const isBg = currentLang === 'BG';
    document.getElementById('matrix-tbody').innerHTML = Object.entries(MATERIAL_MODES).map(([k, mat]) => `
        <tr style="border-bottom: 1px solid #111;">
            <td style="padding:8px 0; color:${mat.color}; font-weight:700;">${mat.icon} ${isBg ? mat.name : mat.nameEn}</td>
            <td style="text-align:right; color:#888;">${mat.target} ppt</td>
            <td style="text-align:right; font-size:8px;">${k === currentMode ? '<span style="color:#00ff41">ACTIVE</span>' : 'STANDBY'}</td>
        </tr>`).join('');
}

function toggleLanguage() {
    currentLang = currentLang === 'BG' ? 'EN' : 'BG';
    document.getElementById('lang-toggle').innerText = currentLang === 'BG' ? 'EN' : 'BG';
    renderMatrix();
    logToTerminal(`LANG_CHANGED: ${currentLang}`);
}

// ══════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════
window.onload = () => {
    initChart();
    renderMatrix();
    updateArtifactCount();
    
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('bg-BG');
    }, 1000);

    setInterval(syncWithESP, 3000);
    logToTerminal(MSG[currentLang].init);
};

</script>
</body>
</html>
