<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASOA - Conservation OS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #05050a; color: #e0e0e0;
            margin: 0; height: 100vh;
            display: flex; flex-direction: column; overflow: hidden;
        }
        header {
            height: 56px; flex-shrink: 0; border-bottom: 1px solid #111;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; background: rgba(0,0,0,.5); backdrop-filter: blur(12px); z-index: 50;
        }
        main { flex: 1; padding: 16px; display: flex; gap: 16px; overflow: hidden; }
        footer {
            height: 32px; flex-shrink: 0; background: #000; border-top: 1px solid #111;
            display: flex; align-items: center; justify-content: space-between; padding: 0 24px;
            font-size: 8px; text-transform: uppercase; letter-spacing: .15em; font-weight: 700; color: #333;
        }
        .tab-panel { flex: 1; display: none; gap: 16px; overflow: hidden; animation: fadeIn .3s ease; }
        .tab-panel.active { display: flex; }
        .tab-scroll { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; padding-right: 2px; }
        .nav-btn {
            padding: 18px 16px; font-size: 10px; text-transform: uppercase; letter-spacing: .15em;
            font-weight: 700; color: #444; background: transparent; border: none; cursor: pointer;
            transition: color .2s; white-space: nowrap; font-family: 'JetBrains Mono', monospace;
        }
        .nav-btn:hover { color: #fff; }
        .nav-btn.active { color: #00f2ff; border-bottom: 2px solid #00f2ff; background: rgba(0,242,255,.05); }
        .card     { border: 1px solid #1a1a2e; background: #0a0a0f; border-radius: 4px; }
        .card-glow { box-shadow: 0 0 20px rgba(0,242,255,.1); }
        .mode-btn {
            padding: 4px 10px; font-size: 9px; font-weight: 700; font-family: 'JetBrains Mono', monospace;
            text-transform: uppercase; cursor: pointer; transition: all .2s; background: transparent;
        }
        .mode-btn.active   { color: #00f2ff; border: 1px solid #00f2ff; }
        .mode-btn.inactive { color: #444;    border: 1px solid #1a1a2e; }
        input, select, textarea {
            width: 100%; background: rgba(0,0,0,.6); border: 1px solid #1a1a2e;
            padding: 8px; font-size: 11px; font-family: 'JetBrains Mono', monospace;
            color: #fff; outline: none;
        }
        .btn-primary {
            width: 100%; padding: 12px; background: #00f2ff; color: #000;
            font-family: 'JetBrains Mono', monospace; font-weight: 800; font-size: 10px;
            text-transform: uppercase; border: none; cursor: pointer;
        }
        .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
        .dot-on  { background: #00ff41; box-shadow: 0 0 6px #00ff41; animation: blinkDot 2s infinite; }
        #terminal { font-size: 9px; }
        .log-line  { color: #666; margin-bottom: 2px; }
        .log-time  { color: #333; margin-right: 8px; }
        .log-arrow { color: #00f2ff; margin-right: 4px; }
        @keyframes fadeIn { from { opacity:0; transform:translateX(6px); } to { opacity:1; transform:translateX(0); } }
        @keyframes blinkDot { 0%,100%{opacity:1} 50%{opacity:.3} }
        .blink { animation: blinkDot 2s infinite; }
    </style>
</head>
<body>

<header>
    <div style="display:flex;align-items:center;gap:16px;">
        <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:32px;height:32px;background:#00f2ff;border-radius:4px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px rgba(0,242,255,.4);">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div>
                <div style="font-size:18px;font-weight:800;letter-spacing:-.05em;color:#fff;line-height:1;">ASOA</div>
                <div style="font-size:9px;color:#00f2ff;letter-spacing:.3em;font-weight:700;">CORE-LINK OS</div>
            </div>
        </div>
        <nav style="display:flex;align-items:center;height:56px;margin-left:40px;">
            <button class="nav-btn active" id="btn-monitor" onclick="showTab('monitor')">Мониторинг</button>
            <button class="nav-btn" id="btn-registry" onclick="showTab('registry')">Регистър</button>
            <button class="nav-btn" id="btn-config" onclick="showTab('config')">Конфиг</button>
        </nav>
    </div>
    <div style="display:flex;align-items:center;gap:16px;font-size:10px;font-weight:700;">
        <div style="display:flex;align-items:center;gap:8px;padding:4px 12px;background:rgba(255,255,255,.05);border-radius:20px;border:1px solid rgba(255,255,255,.1);">
            <span class="blink" style="color:#00f2ff;">●</span>
            <span id="conn-status" style="opacity:.7;">SYSTEM: LIVE</span>
        </div>
        <span id="clock" style="color:#888;">00:00:00</span>
    </div>
</header>

<main>
    <div id="tab-monitor" class="tab-panel active">
        <div style="width:280px;display:flex;flex-direction:column;gap:16px;flex-shrink:0;">
            <div class="card card-glow" style="padding:20px;">
                <div style="font-size:10px;color:#444;text-transform:uppercase;font-weight:700;margin-bottom:12px;">Соленост (TDS)</div>
                <div style="display:flex;align-items:baseline;gap:8px;">
                    <span id="tds-val" style="font-size:48px;font-weight:900;color:#fff;letter-spacing:-.05em;line-height:1;">0.00</span>
                    <span style="font-size:11px;color:#444;font-weight:700;">ppt</span>
                </div>
            </div>
            <div class="card" style="padding:20px;">
                <div style="font-size:10px;color:#444;text-transform:uppercase;font-weight:700;margin-bottom:12px;">Температура</div>
                <div style="display:flex;align-items:baseline;gap:8px;">
                    <span id="temp-val" style="font-size:36px;font-weight:900;color:#fff;letter-spacing:-.05em;line-height:1;">0.0</span>
                    <span style="font-size:11px;color:#444;font-weight:700;">°C</span>
                </div>
            </div>
            <div class="card" style="padding:20px;flex:1;border-left:3px solid #00f2ff;">
                <h3 style="font-size:11px;font-weight:900;text-transform:uppercase;color:#00f2ff;margin-bottom:12px;">Plateau Engine</h3>
                <div id="plateau-status" style="font-size:10px;line-height:1.7;color:#666;">
                    Изчакване на данни...
                </div>
            </div>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;gap:16px;min-width:0;">
            <div class="card" style="flex:1;padding:24px;display:flex;flex-direction:column;min-height:0;">
                <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
                    <h2 style="font-size:16px;font-weight:900;text-transform:uppercase;color:#fff;">Телеметрия от ESP8266</h2>
                    <div style="display:flex;gap:8px;">
                        <button id="btn-mode-glass" class="mode-btn active" onclick="setMode('GLASS')">GLASS</button>
                        <button id="btn-mode-ceramic" class="mode-btn inactive" onclick="setMode('CERAMIC')">CERAMIC</button>
                    </div>
                </div>
                <div style="flex:1;position:relative;"><canvas id="mainChart"></canvas></div>
            </div>
            <div class="card" style="height:130px;padding:14px;overflow-y:auto;">
                <div id="terminal"></div>
            </div>
        </div>
    </div>

    <div id="tab-registry" class="tab-panel">
        <div class="card" style="padding:24px; width: 100%;">
            <h3 style="color:#00f2ff; margin-bottom:20px;">ЛОГОВЕ НА СИСТЕМАТА</h3>
            <div id="full-log" style="font-size:11px; color:#888;">Няма записани артефакти в тази сесия.</div>
        </div>
    </div>
</main>

<footer>
    <div style="display:flex;gap:16px;align-items:center;">
        <span style="display:flex;align-items:center;gap:5px;"><span class="dot dot-on"></span> LINK: ONLINE</span>
        <span>|</span>
        <span>DEVICE: ESP8266_ASOA_01</span>
    </div>
    <div style="opacity:.35;font-style:italic;">© 2026 PROJECT ASOA | REDIS CONNECTED</div>
</footer>

<script>
'use strict';

let tdsHistory = Array(30).fill(0);
let currentMode = 'GLASS';

// CHART INITIALIZATION
const ctx = document.getElementById('mainChart').getContext('2d');
const mainChart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: Array(30).fill(''),
        datasets: [{ 
            data: tdsHistory, 
            borderColor:'#00f2ff', 
            borderWidth:2, 
            fill:true, 
            backgroundColor:'rgba(0,242,255,.06)', 
            tension:0.35, 
            pointRadius:0 
        }]
    },
    options: {
        responsive:true, maintainAspectRatio:false, animation:false,
        scales: {
            y: { grid:{ color:'#0d0d1a' }, ticks:{ color:'#444' } },
            x: { display:false }
        },
        plugins: { legend:{ display:false } }
    }
});

// SYNC WITH VERCEL API (REDIS)
async function fetchData() {
    try {
        const res = await fetch('/api/data');
        const data = await res.json();

        if (data && data.tds !== undefined) {
            // Update Numbers
            document.getElementById('tds-val').textContent = parseFloat(data.tds).toFixed(2);
            document.getElementById('temp-val').textContent = parseFloat(data.temp).toFixed(1);

            // Update Chart
            tdsHistory.shift();
            tdsHistory.push(parseFloat(data.tds));
            mainChart.data.datasets[0].data = tdsHistory;
            mainChart.update('none');

            // Plateau Engine Logic
            const delta = Math.abs(tdsHistory[tdsHistory.length-1] - tdsHistory[tdsHistory.length-5]);
            if (delta < 0.05) {
                document.getElementById('plateau-status').innerHTML = `<span style="color:#00ff41;">СТАБИЛНО ПЛАТО</span><br>Вариация: ${delta.toFixed(4)}`;
            } else {
                document.getElementById('plateau-status').innerHTML = `<span style="color:#ffea00;">АКТИВЕН ПРОЦЕС</span><br>Вариация: ${delta.toFixed(4)}`;
            }

            if(Math.random() > 0.9) addLog(`Входящи данни: ${data.tds} ppt`);
        }
    } catch (e) {
        addLog("Грешка при връзка със сървъра!");
    }
}

function addLog(msg) {
    const t = document.getElementById('terminal');
    const d = document.createElement('div');
    d.className = 'log-line';
    d.innerHTML = `<span class="log-time">[${new Date().toLocaleTimeString('bg-BG')}]</span><span class="log-arrow">>></span>${msg}`;
    t.prepend(d);
}

function showTab(id) {
    ['monitor','registry','config'].forEach(t => {
        const el = document.getElementById('tab-'+t);
        if(el) el.classList.remove('active');
        const btn = document.getElementById('btn-'+t);
        if(btn) btn.classList.remove('active');
    });
    document.getElementById('tab-'+id).classList.add('active');
    document.getElementById('btn-'+id).classList.add('active');
}

function setMode(mode) {
    currentMode = mode;
    const color = mode === 'GLASS' ? '#00f2ff' : '#ffea00';
    mainChart.data.datasets[0].borderColor = color;
    document.getElementById('btn-mode-glass').className = 'mode-btn ' + (mode==='GLASS' ? 'active':'inactive');
    document.getElementById('btn-mode-ceramic').className = 'mode-btn ' + (mode==='CERAMIC' ? 'active':'inactive');
    addLog(`Режим променен: ${mode}`);
}

// Start Clock and Data Polling
setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('bg-BG');
}, 1000);

setInterval(fetchData, 2000); // Проверява за нови данни в Redis на всеки 2 секунди

addLog("ASOA Core-Link OS Initialized...");
addLog("Connecting to Redis via Vercel Edge...");
</script>
</body>
</html>
